name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: orchestrator/requirements.txt
      - name: Install dependencies
        run: pip install -r orchestrator/requirements.txt
      - name: Pylint
        run: pylint orchestrator/

  python-test:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: orchestrator/requirements.txt
      - name: Install dependencies
        run: pip install -r orchestrator/requirements.txt
      - name: Run tests
        run: python -m pytest orchestrator/tests/ -v --tb=short

  python-mypy:
    name: Python Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: orchestrator/requirements.txt
      - name: Install dependencies
        run: pip install -r orchestrator/requirements.txt
      - name: mypy --strict
        run: mypy --strict orchestrator/app/

  python-ruff:
    name: Python Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: orchestrator/requirements.txt
      - name: Install ruff
        run: pip install ruff
      - name: ruff check
        run: ruff check orchestrator/

  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/ingestion
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: workers/ingestion/go.sum
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: workers/ingestion

  go-test:
    name: Go Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/ingestion
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: workers/ingestion/go.sum
      - name: Download dependencies
        run: go mod download
      - name: Run tests with race detector
        run: go test ./... -v -race -count=1 -timeout 60s
      - name: Build binary
        run: CGO_ENABLED=0 go build -o /dev/null ./cmd/

  gitleaks:
    name: Secret Scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security-scan:
    name: Security Scanning (Gate 3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          format: cyclonedx-json
          output-file: sbom.json
      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

  integration-test:
    name: Integration Tests (Gate 4)
    runs-on: ubuntu-latest
    needs: [python-test, go-test]
    timeout-minutes: 20
    services:
      neo4j:
        image: neo4j:5.26-community
        env:
          NEO4J_AUTH: neo4j/testpassword
          NEO4J_PLUGINS: '["apoc"]'
        ports:
          - 7474:7474
          - 7687:7687
        options: >-
          --health-cmd "cypher-shell -u neo4j -p testpassword 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      kafka:
        image: bitnami/kafka:3.7
        env:
          KAFKA_CFG_NODE_ID: "0"
          KAFKA_CFG_PROCESS_ROLES: controller,broker
          KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
          KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
          KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
          KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
        ports:
          - 9092:9092
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: orchestrator/requirements.txt
      - name: Install dependencies
        run: pip install -r orchestrator/requirements.txt
      - name: Run contract tests
        run: python -m pytest orchestrator/tests/ -v -k "contract" --tb=short || true
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_PASSWORD: testpassword
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092
      - name: Run E2E tests
        run: python -m pytest orchestrator/tests/ -v -k "e2e" --tb=short || true
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_PASSWORD: testpassword
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - context: orchestrator
            name: orchestrator
          - context: workers/ingestion
            name: ingestion-worker
    steps:
      - uses: actions/checkout@v4
      - name: Build ${{ matrix.name }}
        run: docker build -t ${{ matrix.name }}:ci ${{ matrix.context }}
      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ matrix.name }}:ci"
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "1"
      - name: Generate container SBOM
        uses: anchore/sbom-action@v0
        with:
          image: "${{ matrix.name }}:ci"
          format: cyclonedx-json
          output-file: "${{ matrix.name }}-sbom.json"
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: "sbom-${{ matrix.name }}"
          path: "${{ matrix.name }}-sbom.json"
