apiVersion: batch/v1
kind: CronJob
metadata:
  name: neo4j-backup
  namespace: graphrag
  labels:
    app: neo4j
    component: backup
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: neo4j
            component: backup
        spec:
          restartPolicy: OnFailure
          containers:
            - name: neo4j-backup
              image: neo4j:5.26-enterprise
              command:
                - /bin/bash
                - -c
                - |
                  neo4j-admin database backup \
                    --to-path=/backups \
                    --from=neo4j-0.neo4j-headless.graphrag.svc.cluster.local:6362 \
                    neo4j
              env:
                - name: NEO4J_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: graphrag-secrets
                      key: NEO4J_PASSWORD
              volumeMounts:
                - name: backup-storage
                  mountPath: /backups
              resources:
                requests:
                  cpu: 250m
                  memory: 1Gi
                limits:
                  cpu: "1"
                  memory: 4Gi
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: neo4j-backup-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: neo4j-backup-pvc
  namespace: graphrag
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
