apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-agent-config
  namespace: graphrag
data:
  vault-agent-config.hcl: |
    vault {
      address = "http://vault.vault.svc.cluster.local:8200"
    }

    auto_auth {
      method "kubernetes" {
        mount_path = "auth/kubernetes"
        config = {
          role = "graphrag"
        }
      }

      sink "file" {
        config = {
          path = "/home/vault/.vault-token"
        }
      }
    }

    template {
      destination = "/vault/secrets/graphrag.env"
      contents    = <<EOT
    {{- with secret "secret/data/graphrag" }}
    NEO4J_PASSWORD={{ .Data.data.NEO4J_PASSWORD }}
    GOOGLE_API_KEY={{ .Data.data.GOOGLE_API_KEY }}
    AUTH_TOKEN_SECRET={{ .Data.data.AUTH_TOKEN_SECRET }}
    ANTHROPIC_API_KEY={{ .Data.data.ANTHROPIC_API_KEY }}
    QDRANT_API_KEY={{ .Data.data.QDRANT_API_KEY }}
    REDIS_PASSWORD={{ .Data.data.REDIS_PASSWORD }}
    {{- end }}
    EOT
    }
