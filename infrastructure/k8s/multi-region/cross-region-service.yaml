apiVersion: v1
kind: Service
metadata:
  name: cross-region-proxy
  namespace: graphrag
  labels:
    app: graphrag
    component: cross-region-proxy
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-internal: "true"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
spec:
  type: LoadBalancer
  selector:
    app: graphrag
    component: cross-region-proxy
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
    - name: https
      port: 443
      targetPort: 8443
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cross-region-proxy
  namespace: graphrag
  labels:
    app: graphrag
    component: cross-region-proxy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: graphrag
      component: cross-region-proxy
  template:
    metadata:
      labels:
        app: graphrag
        component: cross-region-proxy
    spec:
      serviceAccountName: cross-region-proxy
      containers:
        - name: proxy
          image: graphrag/cross-region-proxy:latest
          ports:
            - containerPort: 8080
            - containerPort: 8443
          env:
            - name: REGIONS_CONFIG
              valueFrom:
                configMapKeyRef:
                  name: region-config
                  key: regions.json
            - name: TLS_CERT_PATH
              value: /etc/tls/tls.crt
            - name: TLS_KEY_PATH
              value: /etc/tls/tls.key
          volumeMounts:
            - name: tls-certs
              mountPath: /etc/tls
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: tls-certs
          secret:
            secretName: cross-region-tls
