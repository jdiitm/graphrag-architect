apiVersion: apps/v1
kind: Deployment
metadata:
  name: schema-registry
  namespace: graphrag
  labels:
    app: schema-registry
spec:
  replicas: 2
  selector:
    matchLabels:
      app: schema-registry
  template:
    metadata:
      labels:
        app: schema-registry
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/"
    spec:
      containers:
        - name: schema-registry
          image: confluentinc/cp-schema-registry:7.7.1
          ports:
            - name: http
              containerPort: 8081
          env:
            - name: SCHEMA_REGISTRY_HOST_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS
              value: "SASL_SSL://kafka-0.kafka-headless.graphrag.svc.cluster.local:9092,SASL_SSL://kafka-1.kafka-headless.graphrag.svc.cluster.local:9092,SASL_SSL://kafka-2.kafka-headless.graphrag.svc.cluster.local:9092"
            - name: SCHEMA_REGISTRY_KAFKASTORE_SECURITY_PROTOCOL
              value: SASL_SSL
            - name: SCHEMA_REGISTRY_KAFKASTORE_SASL_MECHANISM
              value: SCRAM-SHA-512
            - name: SCHEMA_REGISTRY_KAFKASTORE_SASL_JAAS_CONFIG
              valueFrom:
                secretKeyRef:
                  name: schema-registry-credentials
                  key: sasl-jaas-config
            - name: SCHEMA_REGISTRY_KAFKASTORE_SSL_TRUSTSTORE_LOCATION
              value: /etc/schema-registry/secrets/kafka.truststore.jks
            - name: SCHEMA_REGISTRY_KAFKASTORE_SSL_TRUSTSTORE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: kafka-tls-credentials
                  key: truststore-password
            - name: SCHEMA_REGISTRY_LISTENERS
              value: "http://0.0.0.0:8081"
            - name: SCHEMA_REGISTRY_SCHEMA_COMPATIBILITY_LEVEL
              value: "BACKWARD"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: kafka-tls
              mountPath: /etc/schema-registry/secrets
              readOnly: true
      volumes:
        - name: kafka-tls
          secret:
            secretName: kafka-tls-credentials
---
apiVersion: v1
kind: Service
metadata:
  name: schema-registry
  namespace: graphrag
spec:
  type: ClusterIP
  selector:
    app: schema-registry
  ports:
    - name: http
      port: 8081
      targetPort: http
