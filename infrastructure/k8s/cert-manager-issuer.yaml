apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: graphrag-selfsigned-issuer
  labels:
    app.kubernetes.io/part-of: graphrag
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: graphrag-ca
  namespace: graphrag
spec:
  isCA: true
  commonName: graphrag-ca
  secretName: graphrag-ca-secret
  duration: 8760h
  renewBefore: 720h
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: graphrag-selfsigned-issuer
    kind: ClusterIssuer
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: graphrag-ca-issuer
  namespace: graphrag
spec:
  ca:
    secretName: graphrag-ca-secret
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: orchestrator-tls
  namespace: graphrag
spec:
  secretName: orchestrator-tls
  duration: 2160h
  renewBefore: 360h
  privateKey:
    algorithm: ECDSA
    size: 256
  usages:
    - server auth
    - client auth
  dnsNames:
    - orchestrator
    - orchestrator.graphrag.svc.cluster.local
  issuerRef:
    name: graphrag-ca-issuer
    kind: Issuer
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ingestion-tls
  namespace: graphrag
spec:
  secretName: ingestion-tls
  duration: 2160h
  renewBefore: 360h
  privateKey:
    algorithm: ECDSA
    size: 256
  usages:
    - server auth
    - client auth
  dnsNames:
    - ingestion
    - ingestion.graphrag.svc.cluster.local
  issuerRef:
    name: graphrag-ca-issuer
    kind: Issuer
