apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: orchestrator-success-rate
  namespace: graphrag
spec:
  metrics:
    - name: success-rate
      interval: 60s
      successCondition: result[0] >= 0.95
      failureLimit: 3
      provider:
        prometheus:
          address: http://prometheus.monitoring.svc.cluster.local:9090
          query: |
            sum(rate(http_requests_total{service="orchestrator",status=~"2.."}[5m]))
            /
            sum(rate(http_requests_total{service="orchestrator"}[5m]))
