apiVersion: chaos-mesh.org/v1alpha1
kind: Workflow
metadata:
  name: orchestrator-pod-kill
  namespace: graphrag
  labels:
    experiment: orchestrator-pod-kill
    component: orchestrator
    tier: application
spec:
  entry: orchestrator-pod-kill-workflow
  templates:
    - name: orchestrator-pod-kill-workflow
      templateType: Serial
      children:
        - steady-state-check
        - inject-pod-kill
        - verify-recovery

    - name: steady-state-check
      templateType: Task
      task:
        container:
          name: steady-state
          image: curlimages/curl:8.5.0
          command:
            - /bin/sh
            - -c
            - |
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
                http://orchestrator.graphrag.svc.cluster.local:8000/health)
              if [ "$HTTP_CODE" = "200" ]; then
                echo "STEADY_STATE_OK: orchestrator healthy"
              else
                echo "STEADY_STATE_FAILED: orchestrator unhealthy"
                exit 1
              fi

    - name: inject-pod-kill
      templateType: PodChaos
      deadline: 60s
      podChaos:
        action: pod-kill
        mode: one
        selector:
          namespaces:
            - graphrag
          labelSelectors:
            app: orchestrator
        gracePeriod: 0

    - name: verify-recovery
      templateType: Task
      task:
        container:
          name: verify
          image: curlimages/curl:8.5.0
          command:
            - /bin/sh
            - -c
            - |
              for i in $(seq 1 30); do
                HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
                  http://orchestrator.graphrag.svc.cluster.local:8000/health 2>/dev/null)
                if [ "$HTTP_CODE" = "200" ]; then
                  echo "RECOVERY_VERIFIED: orchestrator healthy after pod kill"
                  exit 0
                fi
                sleep 5
              done
              echo "RECOVERY_FAILED: orchestrator did not recover within 150s"
              exit 1
