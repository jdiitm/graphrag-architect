apiVersion: chaos-mesh.org/v1alpha1
kind: Workflow
metadata:
  name: neo4j-leader-failure
  namespace: graphrag
  labels:
    experiment: neo4j-leader-failure
    component: neo4j
    severity: critical
spec:
  entry: neo4j-leader-failure-workflow
  templates:
    - name: neo4j-leader-failure-workflow
      templateType: Serial
      children:
        - steady-state-validation
        - inject-leader-failure
        - verify-recovery

    - name: steady-state-validation
      templateType: Task
      task:
        container:
          name: steady-state-check
          image: neo4j:5.26-enterprise
          command:
            - /bin/bash
            - -c
            - |
              cypher-shell -u neo4j -p "$NEO4J_PASSWORD" \
                -a neo4j://neo4j.graphrag.svc.cluster.local:7687 \
                "CALL dbms.cluster.overview() YIELD id, role
                 WHERE role = 'LEADER'
                 RETURN count(*) AS leaders" \
              | grep -q "1" && echo "STEADY_STATE: exactly 1 leader" \
              || (echo "STEADY_STATE_FAILED: expected 1 leader" && exit 1)
          envFrom:
            - secretRef:
                name: graphrag-secrets

    - name: inject-leader-failure
      templateType: PodChaos
      deadline: 120s
      podChaos:
        action: pod-kill
        mode: one
        selector:
          namespaces:
            - graphrag
          labelSelectors:
            app: neo4j
          fieldSelectors:
            metadata.name: neo4j-0
        gracePeriod: 0

    - name: verify-recovery
      templateType: Task
      task:
        container:
          name: recovery-check
          image: neo4j:5.26-enterprise
          command:
            - /bin/bash
            - -c
            - |
              for i in $(seq 1 30); do
                LEADERS=$(cypher-shell -u neo4j -p "$NEO4J_PASSWORD" \
                  -a neo4j://neo4j.graphrag.svc.cluster.local:7687 \
                  "CALL dbms.cluster.overview() YIELD role
                   WHERE role = 'LEADER'
                   RETURN count(*) AS leaders" 2>/dev/null | tail -1)
                if [ "$LEADERS" = "1" ]; then
                  echo "VERIFY: leader re-elected after ${i}0s"
                  exit 0
                fi
                sleep 10
              done
              echo "VERIFY_FAILED: no leader after 300s"
              exit 1
          envFrom:
            - secretRef:
                name: graphrag-secrets
